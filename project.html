<!DOCTYPE html>
<html>
<head>
<title>Amazon Style Store</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f3f3f3;
}

/* HEADER */

header{
background:#131921;
color:white;
display:flex;
align-items:center;
justify-content:space-between;
padding:10px 20px;
flex-wrap:wrap;
}

.logo{
font-size:22px;
font-weight:bold;
}

.search-box input{
padding:8px;
width:250px;
}

.cart-info{
font-size:14px;
}

/* CATEGORY BAR */

.navbar{
background:#232f3e;
color:white;
padding:10px;
}

.navbar select{
padding:6px;
}

/* PRODUCTS */

.container{
padding:20px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.product{
background:white;
padding:15px;
border-radius:10px;
text-align:center;
box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

.product img{
width:170px;
height:170px;
object-fit:cover;
}

button{
border:none;
padding:8px 10px;
border-radius:5px;
cursor:pointer;
margin:3px;
}

.add{background:#ff9900;}
.wish{background:#ff4081;color:white;}
.remove{background:red;color:white;}
.buy{background:#007bff;color:white;}

.cart{
background:white;
margin-top:30px;
padding:20px;
border-radius:10px;
}

.qty{
width:50px;
}

</style>
</head>

<body>

<header>

<div class="logo">🛍 MyAmazon</div>

<div class="search-box">
<input type="text" id="search" placeholder="Search products..." onkeyup="searchProduct()">
</div>

<div class="cart-info">
🛒 Cart: <span id="cart-count">0</span> |
❤️ Wishlist: <span id="wish-count">0</span>
</div>

</header>

<div class="navbar">

Category:
<select onchange="filterCategory(this.value)">
<option value="all">All</option>
<option value="electronics">Electronics</option>
<option value="accessories">Accessories</option>
</select>

</div>

<div class="container">

<div class="products" id="product-list"></div>

<div class="cart">

<h2>Your Cart</h2>

<ul id="cart-items"></ul>

<h3>Total: ₹<span id="total">0</span></h3>

<button class="buy" onclick="checkout()">Buy Now</button>
<button onclick="clearCart()">Clear Cart</button>

</div>

</div>

<script>

let products=[

{name:"Wireless Headphones",price:1500,category:"electronics",rating:"⭐⭐⭐⭐",img:"https://cdn.pixabay.com/photo/2016/11/29/05/08/headphones-1868612_1280.jpg"},
{name:"Smart Watch",price:3000,category:"electronics",rating:"⭐⭐⭐⭐⭐",img:"https://cdn.pixabay.com/photo/2016/11/29/12/30/apple-watch-1867461_1280.jpg"},
{name:"Gaming Keyboard",price:1200,category:"electronics",rating:"⭐⭐⭐⭐",img:"https://cdn.pixabay.com/photo/2016/11/29/09/32/keyboard-1867758_1280.jpg"},
{name:"Wireless Mouse",price:800,category:"electronics",rating:"⭐⭐⭐",img:"https://cdn.pixabay.com/photo/2017/01/06/19/15/mouse-1955148_1280.jpg"},
{name:"Bluetooth Speaker",price:2000,category:"electronics",rating:"⭐⭐⭐⭐",img:"https://cdn.pixabay.com/photo/2016/11/29/02/05/speaker-1867046_1280.jpg"},
{name:"Laptop Stand",price:900,category:"accessories",rating:"⭐⭐⭐⭐",img:"https://cdn.pixabay.com/photo/2016/11/23/14/45/laptop-1851218_1280.jpg"},
{name:"USB Flash Drive",price:500,category:"accessories",rating:"⭐⭐⭐⭐",img:"https://cdn.pixabay.com/photo/2016/11/29/10/07/usb-stick-1867706_1280.jpg"},
{name:"Portable Hard Drive",price:3500,category:"electronics",rating:"⭐⭐⭐⭐⭐",img:"https://cdn.pixabay.com/photo/2016/11/19/14/00/hard-drive-1838380_1280.jpg"}

];

let cart=JSON.parse(localStorage.getItem("cart"))||[];
let wishlist=JSON.parse(localStorage.getItem("wishlist"))||[];

/* DISPLAY PRODUCTS */

function displayProducts(list){

let container=document.getElementById("product-list");
container.innerHTML="";

list.forEach((p,index)=>{

let div=document.createElement("div");
div.className="product";

div.innerHTML=`

<img src="${p.img}">
<h3>${p.name}</h3>
<p>${p.rating}</p>
<p>₹${p.price}</p>

<button class="add" onclick="addToCart(${index})">Add to Cart</button>
<button class="wish" onclick="addWishlist(${index})">Wishlist</button>

`;

container.appendChild(div);

});

}

/* CART */

function addToCart(index){

cart.push({...products[index],qty:1});

localStorage.setItem("cart",JSON.stringify(cart));

updateCart();

}

function updateCart(){

let list=document.getElementById("cart-items");
list.innerHTML="";

let total=0;

cart.forEach((item,i)=>{

total+=item.price*item.qty;

let li=document.createElement("li");

li.innerHTML=`

${item.name} - ₹${item.price}

Qty:
<input class="qty" type="number" value="${item.qty}" min="1"
onchange="changeQty(${i},this.value)">

<button class="remove" onclick="removeItem(${i})">Remove</button>

`;

list.appendChild(li);

});

document.getElementById("cart-count").innerText=cart.length;
document.getElementById("total").innerText=total;

}

function changeQty(i,val){

cart[i].qty=val;

localStorage.setItem("cart",JSON.stringify(cart));

updateCart();

}

function removeItem(i){

cart.splice(i,1);

localStorage.setItem("cart",JSON.stringify(cart));

updateCart();

}

function clearCart(){

cart=[];
localStorage.removeItem("cart");

updateCart();

}

/* WISHLIST */

function addWishlist(index){

wishlist.push(products[index]);

localStorage.setItem("wishlist",JSON.stringify(wishlist));

document.getElementById("wish-count").innerText=wishlist.length;

}

/* SEARCH */

function searchProduct(){

let text=document.getElementById("search").value.toLowerCase();

let filtered=products.filter(p=>p.name.toLowerCase().includes(text));

displayProducts(filtered);

}

/* CATEGORY */

function filterCategory(cat){

if(cat==="all") displayProducts(products);

else displayProducts(products.filter(p=>p.category===cat));

}

/* CHECKOUT */

function checkout(){

if(cart.length==0){

alert("Cart is empty");

return;

}

alert("Order placed successfully!");

clearCart();

}

displayProducts(products);

updateCart();

document.getElementById("wish-count").innerText=wishlist.length;

</script>

</body>
</html>
